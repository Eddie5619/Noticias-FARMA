name: Reportes Semanales IM Pharma

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:
    inputs:
      report_id:
        description: "ID del reporte (vacío = todos)"
        required: false
        default: ""
      days_back:
        description: "Días de historia"
        required: false
        default: "7"
      dry_run:
        description: "Dry-run sin Claude API"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  generate_reports:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install reportlab feedparser anthropic

      - name: Ejecutar pipeline
        run: |
          DRY="${{ github.event.inputs.dry_run }}"
          DAYS="${{ github.event.inputs.days_back }}"
          DAYS=${DAYS:-7}
          REPORT="${{ github.event.inputs.report_id }}"
          
          CMD="python main.py --days $DAYS"
          [ "$DRY" = "true" ] && CMD="$CMD --dry-run"
          [ -n "$REPORT" ] && CMD="$CMD --report $REPORT"
          
          echo "Ejecutando: $CMD"
          $CMD

      - name: Subir PDFs generados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reportes-im-semana-${{ github.run_number }}
          path: output/*.pdf
          retention-days: 90
